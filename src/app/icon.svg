<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Cyber Background -->
  <rect width="512" height="512" rx="120" fill="#06060a" />
  
  <g transform="translate(28, -10)">
    <!-- Little floating block -->
    <rect x="64" y="250" width="32" height="48" rx="16" fill="#00ccff" />

    <!-- Main Arch (Cyan) -->
    <path d="M 140 380 L 140 200 Q 140 120 220 120 L 360 120" fill="none" stroke="#00ccff" stroke-width="64" stroke-linecap="round" />
    
    <!-- Right Leg (Orange) -->
    <path d="M 360 330 L 360 196" fill="none" stroke="#FF7700" stroke-width="64" stroke-linecap="round" />
    
    <!-- Decorative dot (Cyan) -->
    <circle cx="360" cy="410" r="32" fill="#00ccff" />
    
    <!-- Floating Crossbar (Orange) -->
    <rect x="186" y="250" width="80" height="48" rx="24" fill="#FF7700" />
  </g>
</svg>
